version: '3.8'

services:
  # ──────────────────────────────────────────────────
  # Endee OSS Vector Database (HNSW + INT8D, cosine)
  # Listens on http://localhost:8080/api/v1
  # ──────────────────────────────────────────────────
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-vectordb
    ports:
      - "8080:8080"
    environment:
      NDD_NUM_THREADS: 0          # 0 = auto-detect CPU cores
      NDD_AUTH_TOKEN: ""          # Leave blank for local dev (no auth)
    volumes:
      - endee-data:/data          # persist index data across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/indexes"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

  # ──────────────────────────────────────────────────
  # FastAPI Backend (port 8000)
  # ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitiq-api
    ports:
      - "8000:8000"
    depends_on:
      endee:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ENDEE_URL: http://endee:8080/api/v1
      ENDEE_TOKEN: ""
    restart: unless-stopped

volumes:
  endee-data:
