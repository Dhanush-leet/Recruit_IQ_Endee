version: '3.8'

services:
  endee:
    image: endee/endee:latest # Replace with exact endee docker image if available
    ports:
      - "8080:8080"
    environment:
      - ENDEE_TOKEN=your-endee-token # Local debug token

  recruitiq-app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - endee
    environment:
      - ENDEE_URL=http://endee:8080/api/v1
      - ENDEE_TOKEN=your-endee-token
